name: Build-arm64

on:
  push:
    branches: [ main ]
    paths-ignore: [README.md]
  pull_request:
    branches: [ main ]
    paths-ignore: [README.md]
    
jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    name: Build-arm64 
    steps:
        - name: checkout
          uses: actions/checkout@v4
        - name: build
          run: |
            DEBIAN_FRONTEND=noninteractive sudo apt update
            DEBIAN_FRONTEND=noninteractive sudo apt install build-essential cmake gcc make -y
            cd C-edition/
            mkdir build
            cd build
            cmake -DDEBUG=1 -DCMAKE_BUILD_TYPE=Debug ..
            make -j$(nproc)
            DATE=$(date +"%F")
            mkdir aptpac-arm64_$DATE/
            mv ./aptpac aptpac-arm64_$DATE/
            cd aptpac-arm64_$DATE/
            echo -e "\n arm64 aptpac daily build for $DATE
            ===================================\n" > README.txt

        - name: gen-date
          run: echo "DATE=$(date +"%F")" >> $GITHUB_ENV

        - name: upload
          uses: actions/upload-artifact@v4
          with:
                name: aptpac-arm64_${{ env.DATE }}
                path: C-edition/build/aptpac-arm64_${{ env.DATE }}/
